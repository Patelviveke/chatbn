Ab main aapko pure project ka complete step-wise plan deta hun:

Tech Stack jo lagega
Frontend: HTML + CSS + JavaScript
Backend: Node.js + Express + Socket.io
Database: Redis (sirf temporary data ke liye — auto-delete ke liye perfect)

Step 1 — Frontend files banao
Teen pages chahiye:

index.html — username + gender selection screen. Ek input field username ke liye, do buttons "I am a Boy" aur "I am a Girl", aur ek "Start Chatting" button.

waiting.html — loading screen jahan likha ho "Looking for a match..." with animation.

chat.html — actual chat screen jisme message box, send button, aur ek bada "Skip" button ho top pe.

Step 2 — Backend setup karo
npm init -y
npm install express socket.io redis
server.js banao jisme:

Express server port 3000 pe chale
Socket.io real-time connection handle kare
Do waiting queues rakho — ek boys ke liye, ek girls ke liye
Jab boy aur girl dono available hon, unhe ek room mein match karo
Step 3 — Matching logic
Jab koi user connect kare, uska gender dekho. Agar boy hai to girls ki queue check karo — koi girl waiting hai to unhe match karo, warna boy ko boys queue mein daal do. Aur ulta girlke liye. Yahi opposite gender matching ensure karta hai.

Step 4 — Chat aur Skip logic
Match hone ke baad dono ek private Socket.io room mein aa jaate hain. Messages sirf us room mein jaate hain. Skip dabane par:

Current room delete hota hai
Messages automatically wipe ho jaate hain (Redis mein store hi nahi karte permanent)
User wapas waiting queue mein chala jaata hai
Step 5 — Auto-delete messages
Messages Redis mein store karo with TTL (Time To Live) of 0 — matlab jaise hi chat khatam ho (skip ya disconnect), sab delete. Server pe koi bhi message permanently save nahi hota.

Step 6 — Deploy karna
Free mein deploy kar sakte ho:

Backend: Railway.app ya Render.com
Frontend: Netlify ya Vercel
Redis: Upstash.com (free tier)

Yeh server kya karta hai — simple mein:
join event — jab user username aur gender bhejta hai, server usse waiting queue mein dalta hai

findMatch() — boy aata hai to girls queue dekhta hai, girl aati hai to boys queue dekhta hai — opposite gender milte hi room banta hai

createRoom() — dono ko ek private room mein dalta hai, dono ko "matched" signal jaata hai

message event — message sirf us room ke partner ko jaata hai, server pe save nahi hota

skip event — room delete hota hai, dono wapas matching mein jaate hain

disconnect — automatically room delete, queue se bhi hata deta hai

leaveRoom() — room delete hote hi saare messages automatically khatam — koi permanent storage nahi

  <div class="card">
    <div class="logo">💬</div>
    <h1>Random Chat</h1>
    <p class="subtitle">Strangers se baat karo — anonymous aur safe</p>
 
    <label>Apna username chunno</label>
    <input type="text" id="username" placeholder="Koi bhi naam likho..." maxlength="20" />
 
    <span class="gender-label">Aap kaun hain?</span>
    <div class="gender-btns">
      <button class="gender-btn" id="btn-boy" onclick="selectGender('boy')">👦 Boy</button>
      <button class="gender-btn" id="btn-girl" onclick="selectGender('girl')">👧 Girl</button>
    </div>
 
    <button class="start-btn" id="startBtn" onclick="startChat()" disabled>
      Chat Shuru Karo →
    </button>
    <p class="error" id="error">Username aur gender dono choose karo!</p>
  </div>
 
  <script>
    let selectedGender = null;
 
    function selectGender(g) {
      selectedGender = g;
      document.getElementById('btn-boy').className = 'gender-btn' + (g === 'boy' ? ' selected-boy' : '');
      document.getElementById('btn-girl').className = 'gender-btn' + (g === 'girl' ? ' selected-girl' : '');
      checkReady();
    }
 
    document.getElementById('username').addEventListener('input', checkReady);
 
    function checkReady() {
      const name = document.getElementById('username').value.trim();
      document.getElementById('startBtn').disabled = !(name && selectedGender);
    }
 
    function startChat() {
      const username = document.getElementById('username').value.trim();
      if (!username || !selectedGender) {
        document.getElementById('error').style.display = 'block';
        return;
      }
      localStorage.setItem('rc_username', username);
      localStorage.setItem('rc_gender', selectedGender);
      window.location.href = 'waiting.html';
    }
  </script>
